<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>
/* ===== DARK BACKGROUND ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
}

/* CENTER CONTAINER */
.container {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
    box-sizing: border-box;
}

/* CARD */
.card {
    width: 100%;
    max-width: 420px;
    background: #1f2937;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    box-sizing: border-box;
    border: 1px solid rgba(255,255,255,0.08);
}

/* TITLE */
h2 {
    text-align: center;
    color: #60a5fa;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 13px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #374151;
    font-size: 15px;
    outline: none;

    background: #111827;
    color: white;
}

input::placeholder {
    color: #9ca3af;
}

input:focus {
    border-color: #60a5fa;
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #2563eb, #60a5fa);
    color: white;
    font-size: 16px;
    font-weight: bold;

    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.02);
}

/* BONUS TEXT */
#bonusMessage {
    display: none;
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    animation: blink 1s infinite;
}

/* BLINK COLORS */
@keyframes blink {
    0% { color: #ef4444; }
    25% { color: #22c55e; }
    50% { color: #3b82f6; }
    75% { color: #f59e0b; }
    100% { color: #ef4444; }
}

/* LINK */
.link {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #60a5fa;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Create Account</h2>
        <div class="subtitle">Register to start earning</div>

        <input type="text" id="phone" placeholder="Phone Number">
        <input type="password" id="pin" placeholder="Create PIN">

        <button onclick="register()">Register</button>

        <div id="bonusMessage">🎉 "Get 500 Free Bonus" 🎉</div>

        <div class="link" onclick="goLogin()">
            Already have an account? Login
        </div>

    </div>

</div>

<script>
function register() {
    let phone = document.getElementById("phone").value;
    let pin = document.getElementById("pin").value;

    if (!phone || !pin) {
        alert("Please fill all fields");
        return;
    }

    localStorage.setItem("userPhone", phone);
    localStorage.setItem("userPin", pin);
    localStorage.setItem("paid", "false");

    document.getElementById("bonusMessage").style.display = "block";

    setTimeout(() => {
        window.location.href = "payment.html";
    }, 1500);
}

function goLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
