<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Dashboard</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  padding-bottom: 80px; /* prevent bottom bar overlap */
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #111827;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  color: #60a5fa;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin: 8px 0;
  color: #cbd5e1;
  text-decoration: none;
  border-radius: 10px;
}

.sidebar a:hover {
  background: #1f2937;
  color: white;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
  width: 100%;
}

/* TOPBAR */
.topbar {
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  padding: 20px;
  border-radius: 10px;
  font-size: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

/* CARDS */
.card {
  background: #111827;
  padding: 20px;
  border-radius: 15px;
}

/* BUTTON */
button {
  padding: 10px;
  background: #ef4444;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111827;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #1f2937;
  z-index: 1000;
}

.nav-item {
  text-align: center;
  color: #cbd5e1;
  font-size: 12px;
  cursor: pointer;
}

.nav-item:hover {
  color: white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ SaaS</h2>
  <a href="#">🏠 Home</a>
  <a href="#">💰 Payments</a>
  <a href="#">📊 Analytics</a>
  <a href="admin.html">🧑‍💼 Admin</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    🚀 Dashboard
    <div id="userEmail" style="font-size:14px;"></div>
  </div>

  <h2>Welcome 👋</h2>

  <div class="grid">

    <div class="card">
      <h3>💰 Status</h3>
      <p>Premium User ✔</p>
    </div>

    <div class="card">
      <h3>📊 Activity</h3>
      <p>Active</p>
    </div>

    <div class="card">
      <h3>🔒 Security</h3>
      <p>Protected</p>
    </div>

    <div class="card">
      <h3>🚪 Logout</h3>
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="go('tasks')">📋<div>Tasks</div></div>
  <div class="nav-item" onclick="go('withdraw')">💰<div>Withdraw</div></div>
  <div class="nav-item" onclick="shareWhatsApp()">🟢<div>WhatsApp</div></div>
  <div class="nav-item" onclick="shareFacebook()">🔵<div>Facebook</div></div>
  <div class="nav-item" onclick="shareTelegram()">✈️<div>Telegram</div></div>
</div>

<script >
// logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

// show user email
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = "👤 " + user.email;
  } else {
    window.location.href = "login.html";
  }
});

// navigation
window.go = function(page) {
  alert("Opening " + page + " page");
};

// share buttons
window.shareWhatsApp = function() {href="https://wa.me/254748753378" ="_blank">WhatsApp
};

window.shareFacebook = function() {
  window.open("https://www.facebook.com/sharer/sharer.php?u=https://yourwebsite.com", "_blank");
};

window.shareTelegram = function() {
  window.open("https://t.me/share/url?url=https://yourwebsite.com&text=Join%20and%20earn!", "_blank");
};
</script>

</body>
</html>
