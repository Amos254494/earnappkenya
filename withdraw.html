<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 350px;
  background: #111827;
  padding: 25px;
  border-radius: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
}

input {
  background: #0f172a;
  color: white;
}

button {
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>💸 Withdraw</h2>

  <p>🪙 Ksh: <span id="Ksh">0</span></p>

  <input type="text" id="phone" placeholder="M-Pesa Number">
  <input type="number" id="amount" placeholder="Ksh to withdraw">

  <button onclick="withdraw()">Request Withdrawal</button>
</div>
</body>
</html>
